version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: orchestrator_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password
      POSTGRES_DB: orchestrator_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: orchestrator_redis
    restart: always
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', 'redis_secret']
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
